[lcd]
; Absolute path to the image file to display on the LCD.
; Supported formats: PNG, JPEG, BMP, GIF (first frame), WEBP, etc.
image_path = C:\path\to\your\image.png

; Seconds between periodic re-sends (device must receive frames to stay active).
; Minimum value is 1.
resend_interval = 1

; Logging verbosity: DEBUG, INFO, WARNING, ERROR
log_level = INFO
